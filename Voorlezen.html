<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Voorlezen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 24px 16px 60px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #6e6e73; margin-bottom: 20px; }

    textarea {
      width: 100%;
      min-height: 150px;
      border: 1.5px solid #d2d2d7;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.6;
      background: #fff;
      color: #1d1d1f;
      resize: vertical;
      outline: none;
      margin-bottom: 12px;
      -webkit-appearance: none;
    }
    textarea:focus { border-color: #0071e3; }

    /* stem knoppen boven de hoofdknop */
    .voice-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .vbtn {
      flex: 1;
      padding: 10px 4px;
      border: 1.5px solid #d2d2d7;
      border-radius: 10px;
      background: #fff;
      font-size: 13px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .vbtn.on { background: #0071e3; color: #fff; border-color: #0071e3; }

    #startBtn {
      width: 100%;
      padding: 16px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 24px;
      -webkit-tap-highlight-color: transparent;
    }
    #startBtn:active { background: #0062c4; }
    #startBtn.playing { background: #c0392b; }

    .player {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    .prog-wrap { background: #e5e5ea; border-radius: 99px; height: 6px; overflow: hidden; margin-bottom: 6px; }
    #progBar { height: 100%; background: #0071e3; border-radius: 99px; width: 0%; transition: width .3s; }
    .prog-labels { display: flex; justify-content: space-between; font-size: 12px; color: #6e6e73; margin-bottom: 16px; }

    #curSent {
      font-size: 17px;
      line-height: 1.6;
      min-height: 60px;
      background: #f5f5f7;
      border-radius: 10px;
      padding: 12px 14px;
      border-left: 3px solid #0071e3;
      margin-bottom: 20px;
      color: #1d1d1f;
    }

    .btns { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
    .circ {
      width: 52px; height: 52px;
      border-radius: 50%; border: none;
      background: #e5e5ea;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .circ:active { opacity: .65; }
    #ppBtn {
      width: 68px; height: 68px;
      background: #0071e3; color: #fff;
      font-size: 28px;
    }
    #ppBtn:disabled { background: #a1a1a6; }

    .srow { display: flex; align-items: center; gap: 10px; }
    .slbl { font-size: 13px; color: #6e6e73; white-space: nowrap; min-width: 58px; }
    input[type=range] {
      flex: 1; -webkit-appearance: none;
      height: 4px; background: #e5e5ea; border-radius: 99px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px; height: 26px;
      border-radius: 50%; background: #0071e3; cursor: pointer;
    }
    #spdLbl { font-size: 13px; color: #0071e3; font-weight: 600; width: 34px; text-align: right; }

    #status { text-align: center; font-size: 13px; color: #6e6e73; margin-top: 14px; }
  </style>
</head>
<body>

<h1>📖 Voorlezen</h1>
<p class="sub">Plak je tekst, kies een stem en tik op Starten.</p>

<textarea id="txt" placeholder="Plak hier je artikel of tekst..."></textarea>

<div class="voice-row">
  <button class="vbtn on" data-vi="0" id="v0">Stem 1</button>
  <button class="vbtn"     data-vi="1" id="v1">Stem 2</button>
  <button class="vbtn"     data-vi="2" id="v2">Stem 3</button>
</div>

<button id="startBtn">▶ Starten</button>

<div class="player">
  <div class="prog-wrap"><div id="progBar"></div></div>
  <div class="prog-labels">
    <span id="sentLbl">0 / 0</span>
    <span id="pctLbl">0%</span>
  </div>

  <div id="curSent">Nog geen tekst geladen.</div>

  <div class="btns">
    <button class="circ" id="prevBtn">⏮</button>
    <button class="circ" id="ppBtn" disabled>▶</button>
    <button class="circ" id="nextBtn">⏭</button>
  </div>

  <div class="srow">
    <span class="slbl">Snelheid</span>
    <input type="range" id="spd" min="0.6" max="2.0" step="0.1" value="1.0">
    <span id="spdLbl">1.0×</span>
  </div>

  <div id="status">—</div>
</div>

<script>
const synth = window.speechSynthesis;
let sentences = [], idx = 0, playing = false;
let allVoices = [], picked = [], selVI = 0;

const txtEl    = document.getElementById('txt');
const startBtn = document.getElementById('startBtn');
const ppBtn    = document.getElementById('ppBtn');
const prevBtn  = document.getElementById('prevBtn');
const nextBtn  = document.getElementById('nextBtn');
const spdEl    = document.getElementById('spd');
const spdLbl   = document.getElementById('spdLbl');
const curSent  = document.getElementById('curSent');
const progBar  = document.getElementById('progBar');
const sentLbl  = document.getElementById('sentLbl');
const pctLbl   = document.getElementById('pctLbl');
const statusEl = document.getElementById('status');
const vBtns    = document.querySelectorAll('.vbtn');

// ── Voices ──
function loadVoices() {
  allVoices = synth.getVoices();
  if (!allVoices.length) return;
  const en = allVoices.filter(v => v.lang.startsWith('en'));
  const nl = allVoices.filter(v => v.lang.startsWith('nl'));
  const pool = en.length >= 2 ? en : (nl.length >= 2 ? nl : allVoices);
  const uniq = pool.filter((v,i,a) => a.findIndex(x=>x.name===v.name)===i);
  picked = uniq.slice(0,3);
  while (picked.length < 3) picked.push(picked[0]);
  vBtns.forEach((b, i) => {
    const v = picked[i];
    if (!v) return;
    const n = v.name.replace(/com\.apple\.(voice\.)?(compact\.)?/,'').split('.').pop();
    b.textContent = n.length > 9 ? n.slice(0,9)+'…' : n;
    b.title = v.name + ' / ' + v.lang;
  });
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

vBtns.forEach(b => b.addEventListener('click', () => {
  vBtns.forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  selVI = parseInt(b.dataset.vi);
}));

// ── Parse ──
function parse(text) {
  const raw = text.trim().replace(/\n+/g,' ').replace(/\s+/g,' ');
  return (raw.match(/[^.!?]+[.!?]+["']?\s*/g) || [raw])
    .map(s => s.trim()).filter(s => s.length > 2);
}

// ── Display ──
function updateUI() {
  const n = sentences.length;
  if (!n) { curSent.textContent='Nog geen tekst geladen.'; progBar.style.width='0%'; sentLbl.textContent='0 / 0'; pctLbl.textContent='0%'; return; }
  curSent.textContent = sentences[idx];
  const pct = n>1 ? Math.round(idx/(n-1)*100) : 100;
  progBar.style.width = pct+'%';
  sentLbl.textContent = (idx+1)+' / '+n;
  pctLbl.textContent  = pct+'%';
}

// ── Speak ──
function speak() {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(sentences[idx]);
  u.rate = parseFloat(spdEl.value);
  const v = picked[selVI];
  if (v) { u.voice = v; u.lang = v.lang; }
  u.onstart = () => { statusEl.textContent = 'Bezig…'; };
  u.onend = () => {
    if (!playing) return;
    idx++;
    if (idx < sentences.length) { updateUI(); speak(); }
    else { playing=false; ppBtn.textContent='▶'; idx=0; updateUI(); statusEl.textContent='Klaar! ✓'; }
  };
  u.onerror = e => { if (e.error!=='interrupted') statusEl.textContent='Fout: '+e.error; };
  synth.speak(u);
}

// ── START button: load + play in one tap (required for iOS) ──
startBtn.addEventListener('click', () => {
  const val = txtEl.value.trim();
  if (!val) { statusEl.textContent = 'Plak eerst een tekst!'; return; }

  // stop if already playing
  if (playing) {
    synth.cancel(); playing=false;
    startBtn.textContent='▶ Starten'; startBtn.classList.remove('playing');
    ppBtn.textContent='▶'; statusEl.textContent='Gestopt.'; return;
  }

  sentences = parse(val);
  idx = 0;
  if (!sentences.length) { statusEl.textContent='Geen zinnen gevonden.'; return; }
  ppBtn.disabled = false;
  updateUI();

  playing = true;
  startBtn.textContent = '■ Stoppen';
  startBtn.classList.add('playing');
  ppBtn.textContent = '⏸';
  speak();
});

// ── Play/pause (na eerste start) ──
ppBtn.addEventListener('click', () => {
  if (!sentences.length) return;
  if (playing) {
    synth.cancel(); playing=false; ppBtn.textContent='▶';
    statusEl.textContent='Gepauzeerd op zin '+(idx+1)+'.';
  } else {
    playing=true; ppBtn.textContent='⏸'; speak();
  }
});

prevBtn.addEventListener('click', () => {
  synth.cancel(); playing=false; ppBtn.textContent='▶';
  idx = Math.max(0, idx-1); updateUI();
});
nextBtn.addEventListener('click', () => {
  synth.cancel(); playing=false; ppBtn.textContent='▶';
  idx = Math.min(sentences.length-1, idx+1); updateUI();
});

spdEl.addEventListener('input', () => { spdLbl.textContent = parseFloat(spdEl.value).toFixed(1)+'×'; });

updateUI();
</script>
</body>
</html>
