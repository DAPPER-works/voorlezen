<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Voorlezen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 24px 16px 60px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #6e6e73; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
    .card-title { font-size: 13px; font-weight: 600; color: #6e6e73; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .4px; }
    input[type=text], input[type=password] { width: 100%; padding: 12px; border: 1.5px solid #d2d2d7; border-radius: 10px; font-size: 15px; color: #1d1d1f; background: #fff; outline: none; -webkit-appearance: none; }
    input:focus { border-color: #0071e3; }
    textarea { width: 100%; min-height: 130px; border: 1.5px solid #d2d2d7; border-radius: 10px; padding: 12px; font-size: 15px; line-height: 1.6; background: #fff; color: #1d1d1f; resize: vertical; outline: none; -webkit-appearance: none; }
    textarea:focus { border-color: #0071e3; }
    .voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .vbtn { padding: 10px 8px; border: 1.5px solid #d2d2d7; border-radius: 10px; background: #fff; font-size: 14px; text-align: center; cursor: pointer; line-height: 1.3; -webkit-tap-highlight-color: transparent; }
    .vbtn small { display: block; font-size: 11px; color: #6e6e73; margin-top: 2px; }
    .vbtn.on { background: #0071e3; color: #fff; border-color: #0071e3; }
    .vbtn.on small { color: rgba(255,255,255,.75); }
    .srow { display: flex; align-items: center; gap: 10px; }
    .slbl { font-size: 13px; color: #6e6e73; white-space: nowrap; min-width: 58px; }
    input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; background: #e5e5ea; border-radius: 99px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%; background: #0071e3; cursor: pointer; }
    #spdLbl { font-size: 13px; color: #0071e3; font-weight: 600; width: 34px; text-align: right; }
    #startBtn { width: 100%; padding: 16px; background: #0071e3; color: #fff; border: none; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; margin-bottom: 10px; -webkit-tap-highlight-color: transparent; }
    #startBtn.playing { background: #c0392b; }
    #downloadBtn {
      width: 100%; padding: 14px; background: #fff; color: #0071e3;
      border: 2px solid #0071e3; border-radius: 14px; font-size: 16px;
      font-weight: 600; cursor: pointer; margin-bottom: 16px;
      display: none; -webkit-tap-highlight-color: transparent;
    }
    #downloadBtn:disabled { color: #a1a1a6; border-color: #a1a1a6; }
    #downloadBtn.loading { background: #f5f5f7; }
    .prog-wrap { background: #e5e5ea; border-radius: 99px; height: 6px; overflow: hidden; margin-bottom: 6px; }
    #progBar { height: 100%; background: #0071e3; border-radius: 99px; width: 0%; transition: width .4s; }
    .prog-labels { display: flex; justify-content: space-between; font-size: 12px; color: #6e6e73; margin-bottom: 14px; }
    #curSent { font-size: 16px; line-height: 1.65; min-height: 56px; background: #f5f5f7; border-radius: 10px; padding: 12px 14px; border-left: 3px solid #0071e3; margin-bottom: 18px; color: #1d1d1f; }
    .btns { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 18px; }
    .circ { width: 52px; height: 52px; border-radius: 50%; border: none; background: #e5e5ea; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .circ:active { opacity: .65; }
    #ppBtn { width: 68px; height: 68px; background: #0071e3; color: #fff; font-size: 28px; }
    #ppBtn:disabled { background: #a1a1a6; }
    #status { text-align: center; font-size: 13px; color: #6e6e73; margin-top: 10px; min-height: 18px; }
    .chars { font-size: 12px; color: #6e6e73; margin-top: 6px; }
    .chars span { color: #0071e3; font-weight: 600; }
    .tip { font-size: 12px; color: #6e6e73; background: #f5f5f7; border-radius: 8px; padding: 10px 12px; margin-top: 10px; line-height: 1.5; }
    .tip a { color: #0071e3; }
    .err { color: #c0392b; background: #fdf0ed; border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 10px; display: none; }
  </style>
</head>
<body>

<h1>📖 Voorlezen</h1>
<p class="sub">Met ElevenLabs — natuurlijke stemmen.</p>

<div class="card">
  <div class="card-title">ElevenLabs API-sleutel</div>
  <input type="password" id="apiKey" placeholder="Plak hier je API-sleutel…">
  <div class="tip">Gratis account op <a href="https://elevenlabs.io" target="_blank">elevenlabs.io</a> → Developers → API Keys.</div>
</div>

<div class="card">
  <div class="card-title">Tekst</div>
  <textarea id="txt" placeholder="Plak hier je artikel of tekst…"></textarea>
  <div class="chars">Tekens: <span id="charCount">0</span> &nbsp;·&nbsp; Gratis limiet: ~10.000 / maand</div>
</div>

<div class="card">
  <div class="card-title">Stem</div>
  <div class="voice-grid">
    <button class="vbtn on" data-id="21m00Tcm4TlvDq8ikWAM">Rachel<small>Rustig · EN</small></button>
    <button class="vbtn" data-id="TxGEqnHWrfWFTfGW9XjX">Josh<small>Diep · EN</small></button>
    <button class="vbtn" data-id="pNInz6obpgDQGcFmaJgB">Adam<small>Helder · EN</small></button>
    <button class="vbtn" data-id="EXAVITQu4vr4xnSDxMaL">Bella<small>Zacht · EN</small></button>
  </div>
  <div class="tip">Meer stemmen op <a href="https://elevenlabs.io/voice-library" target="_blank">elevenlabs.io/voice-library</a>.</div>
  <input type="text" id="customVoice" placeholder="Of plak hier een andere Voice ID…" style="margin-top:8px">
</div>

<div class="card">
  <div class="card-title">Snelheid</div>
  <div class="srow">
    <span class="slbl">Langzaam</span>
    <input type="range" id="spd" min="0.7" max="1.3" step="0.05" value="1.0">
    <span id="spdLbl">1.0×</span>
  </div>
</div>

<button id="startBtn">▶ Starten</button>
<button id="downloadBtn">⬇ Opslaan als MP3</button>

<div class="card">
  <div class="prog-wrap"><div id="progBar"></div></div>
  <div class="prog-labels"><span id="sentLbl">0 / 0</span><span id="pctLbl">0%</span></div>
  <div id="curSent">Nog geen tekst geladen.</div>
  <div class="btns">
    <button class="circ" id="prevBtn">⏮</button>
    <button class="circ" id="ppBtn" disabled>⏸</button>
    <button class="circ" id="nextBtn">⏭</button>
  </div>
  <div id="status">—</div>
  <div class="err" id="errBox"></div>
</div>

<script>
  const CHUNK = 800;
  let chunks = [], idx = 0, playing = false, currentAudio = null;
  let selectedVoiceId = '21m00Tcm4TlvDq8ikWAM';
  let audioBuffers = []; // store ArrayBuffers for each chunk

  const apiKeyEl   = document.getElementById('apiKey');
  const txtEl      = document.getElementById('txt');
  const startBtn   = document.getElementById('startBtn');
  const downloadBtn= document.getElementById('downloadBtn');
  const ppBtn      = document.getElementById('ppBtn');
  const prevBtn    = document.getElementById('prevBtn');
  const nextBtn    = document.getElementById('nextBtn');
  const spdEl      = document.getElementById('spd');
  const spdLbl     = document.getElementById('spdLbl');
  const curSent    = document.getElementById('curSent');
  const progBar    = document.getElementById('progBar');
  const sentLbl    = document.getElementById('sentLbl');
  const pctLbl     = document.getElementById('pctLbl');
  const statusEl   = document.getElementById('status');
  const errBox     = document.getElementById('errBox');
  const charCount  = document.getElementById('charCount');
  const customV    = document.getElementById('customVoice');

  txtEl.addEventListener('input', () => { charCount.textContent = txtEl.value.length.toLocaleString(); });

  document.querySelectorAll('.vbtn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.vbtn').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); selectedVoiceId = b.dataset.id; customV.value = '';
    });
  });
  customV.addEventListener('input', () => {
    if (customV.value.trim()) { document.querySelectorAll('.vbtn').forEach(x => x.classList.remove('on')); selectedVoiceId = customV.value.trim(); }
  });
  spdEl.addEventListener('input', () => { spdLbl.textContent = parseFloat(spdEl.value).toFixed(2).replace(/\.?0+$/, '') + 'x'; });

  function splitChunks(text) {
    const raw = text.trim().replace(/\s+/g, ' ');
    const sentences = raw.match(/[^.!?]+[.!?]+["']?\s*/g) || [raw];
    const result = []; let current = '';
    for (const s of sentences) {
      if ((current + s).length > CHUNK && current) { result.push(current.trim()); current = s; }
      else { current += s; }
    }
    if (current.trim()) result.push(current.trim());
    return result;
  }

  function updateUI() {
    const n = chunks.length;
    if (!n) { curSent.textContent='Nog geen tekst geladen.'; progBar.style.width='0%'; sentLbl.textContent='0 / 0'; pctLbl.textContent='0%'; return; }
    curSent.textContent = chunks[idx];
    const pct = n > 1 ? Math.round(idx / (n-1) * 100) : 100;
    progBar.style.width = pct + '%'; sentLbl.textContent = (idx+1)+' / '+n; pctLbl.textContent = pct+'%';
  }

  function showErr(msg) { errBox.textContent = msg; errBox.style.display = 'block'; }
  function clearErr() { errBox.style.display = 'none'; }

  // Fetch audio and return both a blob URL (for playing) and ArrayBuffer (for saving)
  async function fetchAudio(text) {
    const key = apiKeyEl.value.trim();
    const resp = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + selectedVoiceId, {
      method: 'POST',
      headers: { 'xi-api-key': key, 'Content-Type': 'application/json', 'Accept': 'audio/mpeg' },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.45, similarity_boost: 0.80, speed: parseFloat(spdEl.value) }
      })
    });
    if (!resp.ok) { const e = await resp.text(); throw new Error('ElevenLabs ' + resp.status + ': ' + e.slice(0,120)); }
    const buffer = await resp.arrayBuffer();
    return buffer;
  }

  async function playChunk() {
    if (!playing || idx >= chunks.length) return;
    updateUI();
    statusEl.textContent = 'Ophalen… (' + (idx+1) + '/' + chunks.length + ')';

    let buffer;
    // Use cached buffer if available
    if (audioBuffers[idx]) {
      buffer = audioBuffers[idx];
    } else {
      try { buffer = await fetchAudio(chunks[idx]); audioBuffers[idx] = buffer; }
      catch(e) { showErr('Fout: ' + e.message); playing=false; startBtn.textContent='▶ Starten'; startBtn.classList.remove('playing'); return; }
    }

    const blob = new Blob([buffer], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    statusEl.textContent = 'Speelt af…';

    currentAudio.onended = () => {
      URL.revokeObjectURL(url);
      if (!playing) return;
      idx++;
      if (idx < chunks.length) { playChunk(); }
      else {
        playing = false; startBtn.textContent = '▶ Starten'; startBtn.classList.remove('playing');
        ppBtn.textContent = '⏸'; idx = 0; updateUI(); statusEl.textContent = 'Klaar! ✓';
        showDownloadBtn();
      }
    };
    currentAudio.onerror = () => { showErr('Kon audio niet afspelen.'); playing = false; };
    currentAudio.play().catch(e => showErr('Afspelen mislukt: ' + e.message));
  }

  function stopAudio() { if (currentAudio) { currentAudio.pause(); currentAudio = null; } }

  function showDownloadBtn() {
    downloadBtn.style.display = 'block';
  }

  // ── Download as single MP3 ──
  downloadBtn.addEventListener('click', async () => {
    clearErr();
    const key = apiKeyEl.value.trim();
    if (!key) { showErr('Voer eerst je API-sleutel in.'); return; }
    if (!chunks.length) { showErr('Geen tekst geladen.'); return; }

    downloadBtn.disabled = true;
    downloadBtn.classList.add('loading');

    // Fetch any missing chunks
    for (let i = 0; i < chunks.length; i++) {
      if (!audioBuffers[i]) {
        downloadBtn.textContent = '⏳ Ophalen fragment ' + (i+1) + ' / ' + chunks.length + '…';
        try { audioBuffers[i] = await fetchAudio(chunks[i]); }
        catch(e) { showErr('Fout bij ophalen: ' + e.message); downloadBtn.disabled=false; downloadBtn.classList.remove('loading'); downloadBtn.textContent='⬇ Opslaan als MP3'; return; }
      }
    }

    // Combine all ArrayBuffers into one MP3 blob
    downloadBtn.textContent = '⏳ Samenvoegen…';
    const combined = new Blob(audioBuffers.map(b => new Blob([b], {type:'audio/mpeg'})), { type: 'audio/mpeg' });
    const url = URL.createObjectURL(combined);

    // Trigger download
    const a = document.createElement('a');
    a.href = url;
    a.download = 'artikel.mp3';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);

    downloadBtn.disabled = false;
    downloadBtn.classList.remove('loading');
    downloadBtn.textContent = '⬇ Opslaan als MP3';
    statusEl.textContent = 'MP3 opgeslagen! Je kunt hem nu delen.';
  });

  startBtn.addEventListener('click', () => {
    clearErr();
    if (!apiKeyEl.value.trim()) { showErr('Voer eerst je ElevenLabs API-sleutel in.'); return; }
    if (!txtEl.value.trim()) { showErr('Plak eerst een tekst.'); return; }
    if (playing) { stopAudio(); playing=false; startBtn.textContent='▶ Starten'; startBtn.classList.remove('playing'); statusEl.textContent='Gestopt.'; return; }

    // Reset if new text
    chunks = splitChunks(txtEl.value.trim());
    audioBuffers = new Array(chunks.length).fill(null);
    idx = 0; ppBtn.disabled = false; downloadBtn.style.display = 'none';
    updateUI(); playing = true;
    startBtn.textContent = '■ Stoppen'; startBtn.classList.add('playing'); ppBtn.textContent = '⏸';
    playChunk();
  });

  ppBtn.addEventListener('click', () => {
    if (!chunks.length) return; clearErr();
    if (playing) { stopAudio(); playing=false; ppBtn.textContent='▶'; statusEl.textContent='Gepauzeerd op fragment '+(idx+1)+'.'; }
    else { playing=true; ppBtn.textContent='⏸'; playChunk(); }
  });

  prevBtn.addEventListener('click', () => { stopAudio(); playing=false; ppBtn.textContent='▶'; idx=Math.max(0,idx-1); updateUI(); });
  nextBtn.addEventListener('click', () => { stopAudio(); playing=false; ppBtn.textContent='▶'; idx=Math.min(chunks.length-1,idx+1); updateUI(); });

  updateUI();
</script>
</body>
</html>
