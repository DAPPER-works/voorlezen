<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Voorlezen</title>
  <script src="https://cdn.jsdelivr.net/npm/@mozilla/readability@0.5.0/Readability.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1d1d1f;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
      display: block;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .url-row {
      display: flex;
      gap: 8px;
    }

    input[type="url"], input[type="text"] {
      flex: 1;
      border: 1.5px solid #d2d2d7;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      background: #f5f5f7;
      min-width: 0;
    }
    input[type="url"]:focus, input[type="text"]:focus {
      border-color: #0071e3;
      background: white;
    }

    button {
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      padding: 12px 18px;
      white-space: nowrap;
    }
    button:active { transform: scale(0.97); opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }

    .btn-fetch {
      background: #0071e3;
      color: white;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #d2d2d7;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      min-height: 160px;
      outline: none;
      font-family: inherit;
      background: #f5f5f7;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: #0071e3;
      background: white;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: #aeaeb2;
      margin-top: 6px;
    }

    .voice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .voice-btn {
      background: #f5f5f7;
      color: #1d1d1f;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 12px;
      text-align: left;
      border: 2px solid transparent;
    }
    .voice-btn.active {
      background: #e8f1fb;
      border-color: #0071e3;
      color: #0071e3;
    }

    select {
      width: 100%;
      border: 1.5px solid #d2d2d7;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      background: #f5f5f7;
      outline: none;
      font-family: inherit;
    }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: #0071e3;
    }
    .speed-val {
      font-size: 14px;
      font-weight: 600;
      color: #0071e3;
      min-width: 36px;
      text-align: right;
    }

    .play-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-play {
      background: #0071e3;
      color: white;
      font-size: 17px;
      padding: 16px;
      width: 100%;
      border-radius: 14px;
    }
    .btn-play.playing {
      background: #ff3b30;
    }

    .controls-row {
      display: flex;
      gap: 8px;
    }
    .controls-row button {
      flex: 1;
      background: #f5f5f7;
      color: #1d1d1f;
      font-size: 15px;
      padding: 12px;
    }

    .progress-bar-wrap {
      background: #e5e5ea;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-bar {
      height: 100%;
      background: #0071e3;
      width: 0%;
      transition: width 0.3s;
      border-radius: 99px;
    }

    .current-sentence {
      font-size: 14px;
      color: #6e6e73;
      line-height: 1.5;
      min-height: 44px;
      padding: 10px 12px;
      background: #f5f5f7;
      border-radius: 10px;
      font-style: italic;
    }

    .status {
      font-size: 13px;
      color: #aeaeb2;
      text-align: center;
      padding-top: 4px;
    }
    .status.error { color: #ff3b30; }
    .status.ok { color: #34c759; }

    .fetching-spinner {
      display: none;
      font-size: 13px;
      color: #6e6e73;
      margin-top: 8px;
    }
    .fetching-spinner.visible { display: block; }
  </style>
</head>
<body>

<h1>🔊 Voorlezen</h1>

<!-- URL invoer -->
<div class="card">
  <label>Webpagina URL</label>
  <div class="url-row">
    <input type="url" id="urlInput" placeholder="https://..." />
    <button class="btn-fetch" onclick="fetchArticle()">Laden</button>
  </div>
  <div class="fetching-spinner" id="fetchSpinner">⏳ Artikel ophalen...</div>
</div>

<!-- Tekst -->
<div class="card">
  <label>Tekst</label>
  <textarea id="textInput" placeholder="Plak hier je tekst, of laad een URL hierboven..." oninput="updateCharCount()"></textarea>
  <div class="char-count"><span id="charCount">0</span> tekens</div>
</div>

<!-- Stem -->
<div class="card">
  <label>Stem</label>
  <select id="voiceSelect" onchange="selectVoice(this.value)">
    <option value="">Stemmen laden...</option>
  </select>
</div>

<!-- Snelheid -->
<div class="card">
  <label>Snelheid</label>
  <div class="speed-row">
    <span style="font-size:13px;color:#6e6e73">Langzaam</span>
    <input type="range" id="speedSlider" min="0.6" max="1.4" step="0.05" value="1.0" oninput="document.getElementById('speedVal').textContent = parseFloat(this.value).toFixed(2) + '×'" />
    <span style="font-size:13px;color:#6e6e73">Snel</span>
    <span class="speed-val" id="speedVal">1.00×</span>
  </div>
</div>

<!-- Afspelen -->
<div class="card play-section">
  <div class="current-sentence" id="currentSentence">Voer tekst in of laad een URL om te beginnen.</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <button class="btn-play" id="playBtn" onclick="togglePlay()">▶ Starten</button>

  <div class="controls-row">
    <button onclick="prevSentence()">⏮ Vorige</button>
    <button onclick="nextSentence()">Volgende ⏭</button>
  </div>

  <div class="status" id="status">Klaar om te starten.</div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────
  let sentences = [];
  let currentIndex = 0;
  let isPlaying = false;
  let selectedVoice = null;
  let voices = [];

  // ─── Voices ──────────────────────────────────────────────
  function loadVoices() {
    voices = speechSynthesis.getVoices();
    if (voices.length === 0) return;

    const sel = document.getElementById('voiceSelect');
    sel.innerHTML = '';

    // Prioritize Dutch voices
    const dutch = voices.filter(v => v.lang.startsWith('nl'));
    const other = voices.filter(v => !v.lang.startsWith('nl'));

    if (dutch.length > 0) {
      const grp = document.createElement('optgroup');
      grp.label = '🇳🇱 Nederlands';
      dutch.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = `${v.name} (${v.lang})`;
        grp.appendChild(opt);
      });
      sel.appendChild(grp);
    }

    if (other.length > 0) {
      const grp = document.createElement('optgroup');
      grp.label = 'Overige talen';
      other.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = `${v.name} (${v.lang})`;
        grp.appendChild(opt);
      });
      sel.appendChild(grp);
    }

    // Select first Dutch voice by default
    if (dutch.length > 0) {
      sel.value = dutch[0].name;
      selectedVoice = dutch[0];
    } else if (voices.length > 0) {
      selectedVoice = voices[0];
    }
  }

  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  function selectVoice(name) {
    selectedVoice = voices.find(v => v.name === name) || null;
  }

  // ─── URL Fetch ────────────────────────────────────────────
  async function fetchArticle() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { setStatus('Voer een URL in.', 'error'); return; }

    const spinner = document.getElementById('fetchSpinner');
    spinner.classList.add('visible');
    setStatus('Artikel ophalen...', '');

    try {
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const resp = await fetch(proxyUrl);
      if (!resp.ok) throw new Error('Netwerkfout');
      const data = await resp.json();

      const parser = new DOMParser();
      const doc = parser.parseFromString(data.contents, 'text/html');

      // Set base URL for relative links
      const base = doc.createElement('base');
      base.href = url;
      doc.head.appendChild(base);

      const reader = new Readability(doc);
      const article = reader.parse();

      if (!article || !article.textContent || article.textContent.trim().length < 50) {
        throw new Error('Geen leesbare tekst gevonden op deze pagina.');
      }

      // Clean up text
      let text = article.textContent
        .replace(/\n{3,}/g, '\n\n')
        .replace(/[ \t]+/g, ' ')
        .trim();

      document.getElementById('textInput').value = text;
      updateCharCount();
      setStatus(`✓ Artikel geladen: "${article.title || 'Onbekende titel'}"`, 'ok');

    } catch (e) {
      setStatus('Kon pagina niet laden: ' + e.message, 'error');
    } finally {
      spinner.classList.remove('visible');
    }
  }

  // Allow pressing Enter in URL field
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchArticle();
  });

  // ─── Text splitting ───────────────────────────────────────
  function splitSentences(text) {
    // Split on sentence-ending punctuation, keeping the delimiter
    const parts = text.match(/[^.!?\n]+[.!?\n]+/g) || [text];
    return parts
      .map(s => s.trim())
      .filter(s => s.length > 1);
  }

  function updateCharCount() {
    const len = document.getElementById('textInput').value.length;
    document.getElementById('charCount').textContent = len.toLocaleString('nl-NL');
  }

  // ─── Playback ─────────────────────────────────────────────
  function togglePlay() {
    if (isPlaying) {
      pause();
    } else {
      startPlaying();
    }
  }

  function startPlaying() {
    const raw = document.getElementById('textInput').value.trim();
    if (!raw) { setStatus('Geen tekst om voor te lezen.', 'error'); return; }

    sentences = splitSentences(raw);
    if (sentences.length === 0) { setStatus('Kon tekst niet verwerken.', 'error'); return; }

    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸ Pauzeren';
    document.getElementById('playBtn').classList.add('playing');

    speakFrom(currentIndex);
  }

  function pause() {
    speechSynthesis.cancel();
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ Hervatten';
    document.getElementById('playBtn').classList.remove('playing');
    setStatus('Gepauzeerd.', '');
  }

  function speakFrom(index) {
    if (index >= sentences.length || !isPlaying) {
      finish();
      return;
    }

    currentIndex = index;
    updateUI();

    const utterance = new SpeechSynthesisUtterance(sentences[index]);
    const rate = parseFloat(document.getElementById('speedSlider').value);
    utterance.rate = rate;
    utterance.pitch = 1;

    if (selectedVoice) utterance.voice = selectedVoice;
    else {
      // Try to pick a Dutch voice on the fly
      const fresh = speechSynthesis.getVoices();
      const nl = fresh.find(v => v.lang.startsWith('nl'));
      if (nl) utterance.voice = nl;
    }

    utterance.onend = () => {
      if (isPlaying) speakFrom(index + 1);
    };
    utterance.onerror = (e) => {
      if (e.error !== 'interrupted') {
        setStatus('Fout bij afspelen: ' + e.error, 'error');
        isPlaying = false;
      }
    };

    // iOS workaround: cancel any pending speech first
    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  }

  function prevSentence() {
    if (currentIndex > 0) {
      speechSynthesis.cancel();
      speakFrom(currentIndex - 1);
    }
  }

  function nextSentence() {
    speechSynthesis.cancel();
    if (currentIndex < sentences.length - 1) {
      speakFrom(currentIndex + 1);
    }
  }

  function finish() {
    isPlaying = false;
    currentIndex = 0;
    document.getElementById('playBtn').textContent = '▶ Opnieuw starten';
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('currentSentence').textContent = '✓ Klaar!';
    setStatus('Voorlezen voltooid.', 'ok');
  }

  function updateUI() {
    const pct = sentences.length > 1
      ? (currentIndex / (sentences.length - 1)) * 100
      : 100;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('currentSentence').textContent = sentences[currentIndex] || '';
    setStatus(`Zin ${currentIndex + 1} van ${sentences.length}`, '');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  // iOS: keep speechSynthesis alive (it pauses after ~15s on iOS)
  setInterval(() => {
    if (isPlaying && !speechSynthesis.speaking && !speechSynthesis.pending) {
      speakFrom(currentIndex);
    }
  }, 5000);
</script>

</body>
</html>
